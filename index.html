<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ゴリラ翻訳機 — Gorilla Translator</title>

  <!-- PWA: installable on a phone home screen -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FFC107">
  <link rel="icon" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ゴリラ翻訳機">
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Body */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
      background: linear-gradient(180deg, #FFC107 0%, #FFD54F 50%, #FFF8E1 100%);
      min-height: 100vh;
      color: #3e2723;
      overflow-x: hidden;
    }

    /* Disco mode — Konami easter egg */
    body.disco {
      animation: discoBg 1.2s linear infinite;
    }

    @keyframes discoBg {
      0%   { background: linear-gradient(180deg, #FF5252, #FFD740); }
      25%  { background: linear-gradient(180deg, #40C4FF, #B388FF); }
      50%  { background: linear-gradient(180deg, #69F0AE, #FFFF00); }
      75%  { background: linear-gradient(180deg, #FF4081, #FFAB40); }
      100% { background: linear-gradient(180deg, #FF5252, #FFD740); }
    }

    body.disco .header-emoji {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* Container */
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .container.quake {
      animation: quake 0.45s ease;
    }

    @keyframes quake {
      0%, 100% { transform: translate(0, 0); }
      20% { transform: translate(-5px, 3px) rotate(-0.6deg); }
      40% { transform: translate(5px, -3px) rotate(0.6deg); }
      60% { transform: translate(-4px, 2px) rotate(-0.4deg); }
      80% { transform: translate(4px, -2px) rotate(0.4deg); }
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 16px;
    }

    .header-emoji {
      font-size: 64px;
      line-height: 1.1;
      margin-bottom: 8px;
      display: inline-block;
    }

    .header-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #3e2723;
      margin-bottom: 4px;
    }

    .header-subtitle {
      font-size: 14px;
      color: #6d4c41;
    }

    /* Name Badge */
    .name-badge {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 10px;
    }

    .name-badge-icon {
      font-size: 20px;
    }

    .name-badge-text {
      border: 2px dashed #d4a017;
      background: #FFF8E1;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 15px;
      font-weight: 600;
      color: #3e2723;
    }

    .name-badge-edit {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      opacity: 0.5;
      transition: opacity 0.15s ease;
      padding: 2px 4px;
    }

    .name-badge-edit:hover {
      opacity: 1;
    }

    .name-badge-input {
      border: 2px solid #d4a017;
      background: #FFF8E1;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 15px;
      font-weight: 600;
      color: #3e2723;
      outline: none;
      width: 140px;
    }

    .name-badge-input:focus {
      border-color: #ffc107;
    }

    /* Mood Chip */
    .mood-chip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin: 0 auto 16px;
      width: fit-content;
      border: 2px solid #4CAF50;
      color: #4CAF50;
      background: #ffffff;
      border-radius: 20px;
      padding: 3px 14px;
      font-size: 13px;
      font-weight: 700;
      transition: color 0.3s ease, border-color 0.3s ease;
    }

    .mood-chip-face {
      font-size: 18px;
      transition: transform 0.2s ease;
    }

    .mood-chip.bump .mood-chip-face {
      transform: scale(1.4);
    }

    /* Input Card */
    .input-card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      padding: 16px;
      margin-bottom: 14px;
    }

    .input-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #6d4c41;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .input-textarea {
      width: 100%;
      background: #fffde7;
      border: 2px solid #ffe082;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 16px;
      font-family: inherit;
      color: #3e2723;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .input-textarea:focus {
      border-color: #ffc107;
    }

    .input-textarea::placeholder {
      color: #bcaaa4;
    }

    /* Button Row */
    .button-row {
      display: flex;
      flex-direction: row;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    /* Buttons - Base */
    .btn {
      flex: 1;
      border: none;
      border-radius: 12px;
      min-height: 44px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      padding: 0 16px;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      color: #ffffff;
    }

    .btn:active {
      transform: scale(0.95);
    }

    /* Translate Button */
    .btn-translate {
      background: #4CAF50;
      box-shadow: 0 3px 0 #388E3C;
    }

    .btn-translate:active {
      box-shadow: 0 1px 0 #388E3C;
      transform: scale(0.95) translateY(2px);
    }

    /* Reverse Button */
    .btn-reverse {
      background: #FF9800;
      box-shadow: 0 3px 0 #E65100;
    }

    .btn-reverse:active {
      box-shadow: 0 1px 0 #E65100;
      transform: scale(0.95) translateY(2px);
    }

    /* Secondary Buttons */
    .btn-secondary {
      background: #fffde7;
      border: 2px solid #ffe082;
      color: #3e2723;
      box-shadow: none;
    }

    .btn-secondary:active {
      transform: scale(0.95);
    }

    /* Output Area */
    .output-area {
      text-align: center;
      margin-bottom: 14px;
    }

    .output-gorilla {
      font-size: 40px;
      line-height: 1;
      margin-bottom: 6px;
      display: inline-block;
      transition: transform 0.2s ease;
    }

    .output-gorilla.react {
      transform: scale(1.3);
    }

    /* Speech Bubble */
    .speech-bubble {
      position: relative;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      padding: 16px 18px 12px;
      text-align: left;
      animation: bubbleIn 0.3s ease forwards;
    }

    /* Legendary golden bubble — easter egg */
    .speech-bubble.legendary {
      background: linear-gradient(135deg, #FFF8E1, #FFECB3);
      box-shadow: 0 0 0 3px #FFD54F, 0 6px 24px rgba(255, 179, 0, 0.5);
      animation: bubbleIn 0.3s ease forwards, goldGlow 1.4s ease-in-out infinite;
    }

    @keyframes goldGlow {
      0%, 100% { box-shadow: 0 0 0 3px #FFD54F, 0 6px 24px rgba(255, 179, 0, 0.4); }
      50%      { box-shadow: 0 0 0 4px #FFC107, 0 8px 32px rgba(255, 143, 0, 0.7); }
    }

    @keyframes bubbleIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Speech Bubble Arrow (triangle above bubble pointing up toward gorilla) */
    .speech-bubble-arrow {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-bottom: 10px solid #ffffff;
    }

    .speech-bubble.legendary .speech-bubble-arrow {
      border-bottom-color: #FFECB3;
    }

    .speech-bubble-text {
      font-size: 22px;
      font-weight: 700;
      color: #3e2723;
      margin-bottom: 8px;
      word-break: break-word;
    }

    /* Gorilla-o-meter rating row */
    .meter-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      border-top: 1px dashed #ffe082;
      padding-top: 8px;
      margin-bottom: 6px;
    }

    .meter-score {
      font-size: 12px;
      font-weight: 800;
      color: #43A047;
      background: #E8F5E9;
      border-radius: 10px;
      padding: 2px 8px;
      white-space: nowrap;
    }

    .meter-score.wild {
      color: #E65100;
      background: #FFF3E0;
    }

    .meter-cert {
      font-size: 11px;
      color: #8d6e63;
      font-weight: 600;
    }

    .speech-bubble-subtitle {
      font-size: 11px;
      color: #a1887f;
    }

    /* Progress Card */
    .progress-card {
      background: rgba(255, 255, 255, 0.6);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 14px;
    }

    .progress-label {
      font-size: 12px;
      font-weight: 700;
      color: #6d4c41;
      margin-bottom: 8px;
    }

    .progress-track {
      background: #ffe082;
      border-radius: 7px;
      height: 14px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #FFC107, #FF9800);
      border-radius: 7px;
      transition: width 0.5s ease;
    }

    .progress-max {
      font-size: 14px;
      font-weight: 800;
      color: #FF6F00;
      text-align: center;
      animation: maxFlash 0.6s ease infinite alternate;
    }

    @keyframes maxFlash {
      from {
        transform: scale(1);
      }
      to {
        transform: scale(1.08);
      }
    }

    /* Emoji Reactions */
    .emoji-reactions {
      font-size: 28px;
      letter-spacing: 10px;
      text-align: center;
      margin-bottom: 14px;
    }

    .emoji-reactions.shake {
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%   { transform: translateX(0) rotate(0deg); }
      15%  { transform: translateX(-4px) rotate(-3deg); }
      30%  { transform: translateX(4px) rotate(3deg); }
      45%  { transform: translateX(-4px) rotate(-3deg); }
      60%  { transform: translateX(4px) rotate(3deg); }
      75%  { transform: translateX(-2px) rotate(-1deg); }
      90%  { transform: translateX(2px) rotate(1deg); }
      100% { transform: translateX(0) rotate(0deg); }
    }

    /* Combo Badge */
    .combo-badge {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%) scale(0.5);
      background: #FF6F00;
      color: #fff;
      font-weight: 900;
      font-size: 20px;
      letter-spacing: 1px;
      padding: 8px 20px;
      border-radius: 30px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
      z-index: 9998;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 0.15s ease;
    }

    .combo-badge.pop {
      animation: comboPop 0.9s ease forwards;
    }

    @keyframes comboPop {
      0%   { opacity: 0; transform: translateX(-50%) scale(0.4) rotate(-8deg); }
      25%  { opacity: 1; transform: translateX(-50%) scale(1.25) rotate(4deg); }
      45%  { transform: translateX(-50%) scale(1) rotate(-2deg); }
      80%  { opacity: 1; transform: translateX(-50%) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: translateX(-50%) scale(0.9); }
    }

    /* Banana Rain */
    .banana-rain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 9997;
    }

    .banana-drop {
      position: fixed;
      top: -48px;
      animation: fall linear forwards;
      will-change: transform;
    }

    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(110vh) rotate(540deg); opacity: 0.6; }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: #3e2723;
      color: #ffffff;
      border-radius: 24px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      z-index: 9999;
      transition: transform 0.3s ease;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="container" id="container">

    <!-- Header -->
    <header class="header">
      <div class="header-emoji" id="headerEmoji">🦍</div>
      <h1 class="header-title">GORILLA TRANSLATOR</h1>
      <p class="header-subtitle">ゴリラ翻訳機</p>
    </header>

    <!-- Gorilla Name Badge -->
    <div class="name-badge">
      <span class="name-badge-icon">🦍</span>
      <span class="name-badge-text" id="gorillaNameDisplay">ゴリ太郎</span>
      <button class="name-badge-edit" id="nameEditBtn" aria-label="名前を変更">✏️</button>
      <input class="name-badge-input" id="gorillaNameInput" type="text" maxlength="20" style="display:none;">
    </div>

    <!-- Gorilla Mood Chip -->
    <div class="mood-chip" id="moodChip">
      <span class="mood-chip-face" id="moodFace">😎</span>
      <span id="moodLabel">ごきげん</span>
    </div>

    <!-- Input Area -->
    <div class="input-card">
      <label class="input-label" for="mainInput">INPUT</label>
      <textarea id="mainInput" class="input-textarea" rows="3" placeholder="ゴリラ語を入力... 例: ウホウホ？ウホォ！"></textarea>
    </div>

    <!-- Main Action Buttons -->
    <div class="button-row">
      <button class="btn btn-translate" id="translateBtn">🦍→日本語 翻訳</button>
      <button class="btn btn-reverse" id="reverseBtn">日本語→🦍 逆翻訳</button>
    </div>

    <!-- Output Speech Bubble -->
    <div class="output-area" id="outputArea" style="display:none;">
      <div class="output-gorilla" id="outputGorilla">🦍</div>
      <div class="speech-bubble" id="speechBubble">
        <div class="speech-bubble-arrow"></div>
        <div class="speech-bubble-text" id="outputText"></div>
        <div class="meter-row" id="meterRow">
          <span class="meter-score" id="meterScore"></span>
          <span class="meter-cert" id="meterCert"></span>
        </div>
        <div class="speech-bubble-subtitle" id="outputSubtitle">ゴリ太郎の翻訳結果</div>
      </div>
    </div>

    <!-- Banana Progress Bar -->
    <div class="progress-card">
      <div class="progress-label">バナナパワー 🍌</div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-max" id="progressMax" style="display:none;">🍌 MAX POWER! 🍌</div>
    </div>

    <!-- Secondary Buttons -->
    <div class="button-row">
      <button class="btn btn-secondary" id="soundBtn">🔊 Sound</button>
      <button class="btn btn-secondary" id="shareBtn">📤 Share</button>
    </div>

    <!-- Emoji Reactions -->
    <div class="emoji-reactions" id="emojiReactions">🦍🍌😂</div>

  </div>

  <!-- Combo Badge, Banana Rain & Toast (fixed overlays) -->
  <div class="combo-badge" id="comboBadge"></div>
  <div class="banana-rain" id="bananaRain"></div>
  <div class="toast" id="toast"></div>

  <script>
    // ============================================================
    // Small helpers
    // ============================================================
    const rand = (n) => Math.floor(Math.random() * n);

    // ============================================================

        ['雨の日は静かにしたい', 'p'],
        ['ため息しか出ない', 'p'],
        ['遠い目してる', 'p'],
        ['ちょっと放っておいて', 'c'],
        ['木の上でぼーっとしたい', 'p'],
        ['今日は静かにドラミング', 'p'],
        ['夕日がきれいだな', 's'],
        ['バナナも半分しかない', 'p'],
        ['誰かそばにいてくれ', 'c'],
        ['風が冷たい', 'p'],
        ['何もしたくない日もある', 'p'],
      ],
    };

    // Legendary golden-bubble phrases (easter egg)
    const LEGENDARY = [
      '……我こそはジャングルの王である。ひざまずけ。👑',
      'バナナは……皮にこそ真実が宿る。悟ったわ。🍌✨',
      'ウホは言語ではない。生き方だ。🦍',
      '実は……オレ、二足歩行もイケる。🚶',
      '森羅万象、すべてはドラミングに通ず。🥁',
      '……今のは聞かなかったことにしてくれ。🤫',
      'この星は、いずれゴリラのものになる。🌍',
    ];

    // Compositing fragments.
    // Prefixes are universally-safe leading fillers.
    // Suffixes are ONLY tails that stay grammatical after any noun/verb/adj.
    const PREFIXES = ['あのさ、', 'ねえ、', 'まあ、', 'ちょっと、', 'いや、', 'つまり、', 'ぶっちゃけ、', 'ていうか、', 'うーん、', 'おい、'];
    const SUFFIXES = ['って感じ', 'かな', 'かも', 'って話'];

    const GORILLA_SOUNDS = {
      short_kata:  ['ウホ', 'ウッホ', 'ホ'],
      short_hira:  ['うほ', 'うっほ', 'ほ'],
      medium_kata: ['ウホウホ', 'ウホッウホ'],
      medium_hira: ['うほうほ', 'うほっうほ'],
      long_kata:   ['ウホウホウホ', 'ウッホウッホ', 'ウホウホウッホ'],
      long_hira:   ['うほうほうほ', 'うっほうっほ'],
      dramatic:    ['ウッ…', 'ドンドン🥁', '*胸を叩く*', '…', 'ウホォォォ'],
    };

    const PARTICLES = /([はがをにでともの]|[よねか](?=[。！？、]|$)|[。！？、\n])/;

    // ============================================================
    // Mood system
    // ============================================================

    const MOODS = {
      chill:  { face: '😎', label: 'ごきげん', color: '#4CAF50', emojis: ['🦍😎🍌', '🦍🌴✨', '😎🦍👍'], tails: ['', '', '🍌', '😎', '🌴'] },
      hyped:  { face: '🤩', label: '大興奮',   color: '#FB8C00', emojis: ['🦍🔥🍌', '🤩🦍💥', '🍌🦍⚡'], tails: ['🔥', '💥', '⚡', '🔥'] },
      hangry: { face: '😤', label: 'おこ',     color: '#E53935', emojis: ['🦍😤💢', '💢🦍🍌', '😤🦍🔥'], tails: ['💢', '😤', '🔥', '💢'] },
      emo:    { face: '🥺', label: 'おセンチ', color: '#5C6BC0', emojis: ['🦍🥺💧', '🌧🦍💭', '🥺🦍🍂'], tails: ['💧', '🥺', '🍂', '💧'] },
      lovey:  { face: '🥰', label: 'ラブラブ', color: '#EC407A', emojis: ['🦍🥰💕', '💕🦍🍌', '🥰🦍✨'], tails: ['💕', '🥰', '✨', '💕'] },
    };

    const CATEGORY_MOOD = {
      excited: 'hyped', passionate: 'hyped',
      question: 'hangry', emphasis: 'hangry',
      emotional: 'emo', melancholy: 'emo',
      casual: 'chill', greeting: 'chill',
    };

    // ============================================================
    // TASK 4: Translation Engine — Gorilla → Japanese
    // ============================================================

    const session = {
      translationCount: 0,
      gorillaTranslateCount: 0, // separate counter for gorilla→JP direction
      ringBuffer: [],
      ringBufferSize: 8,
      weights: {},
      mood: 'chill',
      moodPoints: { chill: 1, hyped: 0, hangry: 0, emo: 0, lovey: 0 },
    };

    function initWeights() {
      for (const category in PHRASE_POOLS) {
        session.weights[category] = {};
        for (const entry of PHRASE_POOLS[category]) {
          session.weights[category][entry[0]] = 1;
        }
      }
    }
    initWeights();

    function analyzeSignals(input) {
      const exclamations = (input.match(/[!！]/g) || []).length;
      // A trailing-off "…" reads as wistful, not hyped — check sadness before
      // the repeated-character excitement rule (which would otherwise catch "...").
      if (/[?？]/.test(input)) return { category: 'question', intensity: 1 };
      if (/\.{3}|。。。|…|〜{2,}|～{2,}/.test(input)) return { category: 'melancholy', intensity: 1 };
      // Repeated NON-punctuation chars (ウウウ, ！！！) signal excitement.
      if (exclamations >= 3 || /([^\s.。！!？?…、])\1{4,}/.test(input)) return { category: 'excited', intensity: 3 };
      if (exclamations >= 1 || /([^\s.。！!？?…、])\1{2,}/.test(input)) return { category: 'excited', intensity: exclamations || 1 };
      if (input.length > 20) return { category: 'passionate', intensity: Math.min(3, Math.floor(input.length / 20)) };
      if (/(.{2,3})\1{2,}/.test(input)) return { category: 'emphasis', intensity: 2 };
      if (
        /[゠-ヿ]/.test(input) &&
        /[぀-ゟ]/.test(input) &&
        (input.match(/[。！？、…]/g) || []).length >= 2
      ) return { category: 'emotional', intensity: 1 };
      if (input.length < 5) return { category: 'casual', intensity: 1 };
      return { category: 'casual', intensity: 1 };
    }

    function bumpMood(category, input) {
      // Decay all moods so the most recent translations dominate the reading.
      // 0.5 keeps a little memory (a streak still shows) while letting a single
      // strong input flip the mood — the gorilla reacts to what you just said.
      for (const k in session.moodPoints) session.moodPoints[k] *= 0.5;
      let mood = CATEGORY_MOOD[category] || 'chill';
      // Affection keywords override toward lovey.
      if (/好き|愛|大好き|恋|ハート|💕|❤|😍|🥰/.test(input)) mood = 'lovey';
      session.moodPoints[mood] += 2;
      // Current mood = highest points; ties go to the mood we just bumped so a
      // fresh input wins over a decayed streak of equal weight.
      const maxVal = Math.max(...Object.values(session.moodPoints));
      session.mood = session.moodPoints[mood] === maxVal
        ? mood
        : Object.keys(session.moodPoints).find(k => session.moodPoints[k] === maxVal);
    }

    function weightedPick(category) {
      const pool = PHRASE_POOLS[category];
      const weights = session.weights[category];

      let total = pool.reduce((sum, e) => sum + weights[e[0]], 0);
      // Reset when all weights have decayed near zero
      if (total < pool.length * 0.2) {
        for (const e of pool) weights[e[0]] = 1;
        total = pool.length;
      }

      let r = Math.random() * total;
      for (const entry of pool) {
        r -= weights[entry[0]];
        if (r <= 0) {
          weights[entry[0]] = Math.max(0.1, weights[entry[0]] * 0.5);
          return entry;
        }
      }
      // fallback: last entry
      const last = pool[pool.length - 1];
      weights[last[0]] = Math.max(0.1, weights[last[0]] * 0.5);
      return last;
    }

    // Grammar-aware compositing. Only attaches a prefix/suffix where the
    // phrase kind allows it, so results stay well-formed Japanese.
    function compose(entry) {
      let [core, kind] = entry;

      // Prefix: leading fillers work before declaratives & commands.
      // Skip when the phrase already opens with its own interjection (comma).
      if ((kind === 'p' || kind === 'c') && !core.includes('、') && Math.random() < 0.35) {
        core = pick(PREFIXES) + core;
      }

      // Suffix: only plain declaratives, and never onto something that
      // already ends in punctuation or carries a comma.
      if (kind === 'p' && !/[！？。…、]/.test(core) && Math.random() < 0.45) {
        core = core + pick(SUFFIXES);
      }

      return core;
    }

    function addIntensity(text, intensity) {
      if (intensity <= 1) return text;
      // Only escalate phrases that end on an exclamation; never touch
      // questions or trailing ellipses.
      if (!/[！!]$/.test(text)) return text;
      const bangs = '！'.repeat(Math.min(intensity, 3));
      const stripped = text.replace(/[！!]+$/, '');
      return stripped + bangs;
    }

    function isInRingBuffer(text) {
      return session.ringBuffer.includes(text);
    }

    function pushRingBuffer(text) {
      session.ringBuffer.push(text);
      if (session.ringBuffer.length > session.ringBufferSize) {
        session.ringBuffer.shift();
      }
    }

    // Legendary trigger: certain "royal" keywords, or a rare random roll.
    function isLegendary(input) {
      if (/キング|ボス|王様|伝説|レジェンド|ゴッド/.test(input)) return true;
      return Math.random() < 0.025;
    }

    function moodTail() {
      const tails = MOODS[session.mood].tails;
      return pick(tails);
    }

    function translateGorillaToJapanese(input) {
      if (!input || input.trim() === '') return null;

      session.translationCount++;
      session.gorillaTranslateCount++;

      const { category, intensity } = analyzeSignals(input);
      bumpMood(category, input);

      // Legendary golden translation (easter egg).
      if (isLegendary(input)) {
        const text = pick(LEGENDARY);
        pushRingBuffer(text);
        return { text: text, legendary: true };
      }

      // First gorilla→JP translation: usually a greeting.
      if (session.gorillaTranslateCount === 1 && Math.random() < 0.6) {
        const greeting = compose(weightedPick('greeting'));
        pushRingBuffer(greeting);
        return { text: greeting, legendary: false };
      }

      let result = null;
      for (let i = 0; i < 10; i++) {
        const composite = compose(weightedPick(category));
        if (!isInRingBuffer(composite)) {
          result = composite;
          break;
        }
      }
      if (result === null) {
        result = compose(weightedPick(category));
      }

      result = addIntensity(result, intensity);
      pushRingBuffer(result);

      // Flavor tail: banana overload at MAX, otherwise a mood-colored emoji.
      if (bananaProgress >= 100) {
        result = result + '🍌'.repeat(1 + rand(3));
      } else if (session.translationCount >= 3 && Math.random() < 0.35) {
        result = result + moodTail();
      }

      return { text: result, legendary: false };
    }

    // ============================================================
    // TASK 5: Reverse Translation — Japanese → Gorilla
    // ============================================================

    function chunkJapanese(input) {
      const parts = input.split(PARTICLES);
      const chunks = [];
      let current = '';

      for (const part of parts) {
        current += part;
        // Merge small fragments (≤2 chars) with the next part unless it ends with sentence-final punctuation
        if (current.length > 2 || /[。！？\n]/.test(current)) {
          chunks.push(current);
          current = '';
        }
      }
      if (current.length > 0) {
        if (chunks.length > 0) {
          chunks[chunks.length - 1] += current;
        } else {
          chunks.push(current);
        }
      }

      return chunks.filter(c => c.length > 0);
    }

    function chunkToGorilla(chunk) {
      // Detect trailing punctuation to preserve
      const trailingMatch = chunk.match(/([！？。])$/);
      const trailing = trailingMatch ? trailingMatch[1] : '';
      const base = trailing ? chunk.slice(0, -1) : chunk;
      const len = base.length;

      // Decide katakana or hiragana pool randomly
      const useKata = Math.random() < 0.5;

      let sound;
      if (len <= 3) {
        const pool = useKata ? GORILLA_SOUNDS.short_kata : GORILLA_SOUNDS.short_hira;
        sound = pick(pool);
      } else if (len <= 7) {
        const pool = useKata ? GORILLA_SOUNDS.medium_kata : GORILLA_SOUNDS.medium_hira;
        sound = pick(pool);
      } else {
        const pool = useKata ? GORILLA_SOUNDS.long_kata : GORILLA_SOUNDS.long_hira;
        sound = pick(pool);
      }

      // Preserve trailing punctuation with gorilla flavor
      if (trailing === '！') return sound + 'ウホォ！';
      if (trailing === '？') return sound + 'ウホ？';
      if (trailing === '。') return sound + 'ウホ。';
      return sound;
    }

    function translateJapaneseToGorilla(input) {
      if (!input || input.trim() === '') return null;

      session.translationCount++;
      bumpMood(analyzeSignals(input).category, input);

      const chunks = chunkJapanese(input);
      const gorillaParts = [];

      for (let i = 0; i < chunks.length; i++) {
        gorillaParts.push(chunkToGorilla(chunks[i]));
        // 15% chance to insert a dramatic sound between chunks (not after last)
        if (i < chunks.length - 1 && Math.random() < 0.15) {
          gorillaParts.push(pick(GORILLA_SOUNDS.dramatic));
        }
      }

      let result = gorillaParts.join(' ');
      if (bananaProgress >= 100) {
        result = result + '🍌'.repeat(1 + rand(3));
      }
      return { text: result, legendary: false };
    }

    // ============================================================
    // Gorilla-o-meter — fake academic accuracy rating
    // ============================================================

    const CERTS = [
      'ゴリラ言語学会 認定',
      'バナナ大学 監修',
      'ドラミング検定1級',
      'ジャングルISO 取得',
      '全国ウホウホ協会 公認',
      '霊長類翻訳ギルド 保証',
      '森の長老 お墨付き',
      'バナナソムリエ 認証',
      '国際ウホ標準規格 準拠',
    ];

    function makeRating(legendary) {
      let pct, wild;
      if (legendary) {
        return { pct: '∞', cert: 'ゴリラ神 直々の啓示 👑', wild: true };
      }
      const roll = Math.random();
      if (roll < 0.08) {
        // Comically low / broken reading
        pct = Math.random() < 0.5 ? '404' : '0.' + (1 + rand(8));
        wild = true;
      } else if (roll < 0.16) {
        // Absurdly over 100%
        pct = String(101 + rand(69));
        wild = true;
      } else {
        // Suspiciously precise high confidence
        pct = (85 + Math.random() * 14.9).toFixed(1);
        wild = false;
      }
      return { pct: pct, cert: pick(CERTS), wild: wild };
    }

    // ===== SOUND =====

    let audioCtx = null;

    function playUho(startTime, baseFreq) {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sawtooth';
      // "Uh" part: low frequency
      osc.frequency.setValueAtTime(baseFreq, startTime);
      // "Ho" part: pitch bend up
      osc.frequency.linearRampToValueAtTime(baseFreq * 1.6, startTime + 0.15);
      // Drop back
      osc.frequency.linearRampToValueAtTime(baseFreq * 0.8, startTime + 0.3);
      // Gain envelope
      gain.gain.setValueAtTime(0, startTime);
      gain.gain.linearRampToValueAtTime(0.3, startTime + 0.03);
      gain.gain.setValueAtTime(0.3, startTime + 0.15);
      gain.gain.linearRampToValueAtTime(0, startTime + 0.35);
      osc.start(startTime);
      osc.stop(startTime + 0.35);
    }

    function playGorillaSound(bursts) {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const now = audioCtx.currentTime;
      const burstCount = bursts || (1 + rand(3));
      for (let i = 0; i < burstCount; i++) {
        playUho(now + i * 0.4, 80 + Math.random() * 40);
      }
    }

    // ===== SHARE =====

    let lastInput = '';
    let lastOutput = '';

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(function() {
        toast.classList.remove('show');

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(function() {
        showToast('クリップボードにコピーしました！');
      }).catch(function() {
        showToast('コピーに失敗しました');
      });
    }

    function shareTranslation() {
      const text = '「' + lastInput + ' → ' + lastOutput + ' 🦍」\nゴリラ翻訳機で翻訳しました';
      if (navigator.share) {
        navigator.share({ text: text }).catch(function() {
          copyToClipboard(text);

    // ===== NAME MANAGEMENT =====

    const DEFAULT_NAME = 'ゴリ太郎';
    const NAME_STORAGE_KEY = 'gorillaName';

    function getGorillaName() {
      try {
        return localStorage.getItem(NAME_STORAGE_KEY) || DEFAULT_NAME;
      } catch (e) {
        return DEFAULT_NAME;
      }
    }

    function setGorillaName(name) {
      const trimmed = (name || '').trim();
      const finalName = trimmed.length > 0 ? trimmed : DEFAULT_NAME;
      try {
        localStorage.setItem(NAME_STORAGE_KEY, finalName);
      } catch (e) { /* Safari private mode — silently skip */ }
      updateNameDisplay(finalName);

    function updateNameDisplay(name) {
      document.getElementById('gorillaNameDisplay').textContent = name;

    // ===== PROGRESS BAR =====

    let bananaProgress = 0;

    function updateProgressBar() {
      const wasMax = bananaProgress >= 100;
      bananaProgress = Math.min(100, bananaProgress + 12);
      const fill = document.getElementById('progressFill');
      fill.style.width = bananaProgress + '%';
      const maxLabel = document.getElementById('progressMax');
      if (bananaProgress >= 100) {
        maxLabel.style.display = '';
        // Re-trigger animation
        maxLabel.style.animation = 'none';
        maxLabel.offsetHeight;
        maxLabel.style.animation = '';
        if (!wasMax) bananaRain(24); // celebrate hitting MAX once
      } else {
        maxLabel.style.display = 'none';
      }
    }

    // ===== COMBO METER =====

    let comboCount = 0;
    let lastTranslateTime = 0;
    const COMBO_WINDOW = 2200; // ms between translations to keep a streak alive

    function registerCombo() {
      const now = Date.now();
      comboCount = (now - lastTranslateTime < COMBO_WINDOW) ? comboCount + 1 : 1;
      lastTranslateTime = now;

      if (comboCount < 3) return;

      let label, color;
      if (comboCount >= 8)      { label = 'ULTRA GORILLA'; color = '#D50000'; }
      else if (comboCount >= 5) { label = 'SUPER';         color = '#FF3D00'; }
      else                      { label = '';              color = '#FF6F00'; }

      const badge = document.getElementById('comboBadge');
      badge.textContent = '🔥 ' + (label ? label + ' ' : '') + comboCount + ' COMBO!!';
      badge.style.background = color;
      badge.classList.remove('pop');
      badge.offsetHeight;
      badge.classList.add('pop');

      if (comboCount >= 5) {
        quakeScreen();
        bananaRain(6 + comboCount * 2);
        playGorillaSound(Math.min(4, Math.floor(comboCount / 3)));
      }
    }

    // ===== BANANA RAIN =====

    function bananaRain(count) {
      const container = document.getElementById('bananaRain');
      for (let i = 0; i < count; i++) {
        const drop = document.createElement('span');
        drop.className = 'banana-drop';
        drop.textContent = Math.random() < 0.15 ? '🦍' : '🍌';
        drop.style.left = (Math.random() * 100) + 'vw';
        drop.style.animationDuration = (1.6 + Math.random() * 1.8) + 's';
        drop.style.animationDelay = (Math.random() * 0.4) + 's';
        drop.style.fontSize = (18 + Math.random() * 22) + 'px';
        container.appendChild(drop);
        setTimeout(function() { drop.remove(); }, 4200);
      }
    }

    // ===== DISCO MODE (Konami easter egg) =====

    function toggleDisco() {
      const on = document.body.classList.toggle('disco');
      showToast(on ? '🕺 ディスコゴリラ解禁！🪩' : 'ディスコ終了 😌');

    // ===== ANIMATIONS =====

    function animateGorilla() {
      const gorilla = document.getElementById('outputGorilla');
      gorilla.classList.add('react');
      setTimeout(function() {
        gorilla.classList.remove('react');
      }, 300);
    }

    function animateEmoji() {
      const el = document.getElementById('emojiReactions');
      el.textContent = pick(MOODS[session.mood].emojis);
      el.classList.remove('shake');
      el.offsetHeight;
      el.classList.add('shake');
      setTimeout(function() {
        el.classList.remove('shake');
      }, 400);

    function quakeScreen() {
      const c = document.getElementById('container');
      c.classList.remove('quake');
      c.offsetHeight;
      c.classList.add('quake');

    function updateMoodUI() {
      const m = MOODS[session.mood];
      document.getElementById('moodFace').textContent = m.face;
      document.getElementById('moodLabel').textContent = m.label;
      const chip = document.getElementById('moodChip');
      chip.style.borderColor = m.color;
      chip.style.color = m.color;
      chip.classList.remove('bump');
      chip.offsetHeight;
      chip.classList.add('bump');
      setTimeout(function() { chip.classList.remove('bump'); }, 220);
    }

    // ===== EVENT LISTENERS & INITIALIZATION =====

    function handleTranslation(payload, input) {
      if (!payload) return;
      const result = payload.text;
      lastInput = input;
      lastOutput = result;

      const outputArea = document.getElementById('outputArea');
      const bubble = document.getElementById('speechBubble');
      document.getElementById('outputText').textContent = '「' + result + '」';

      // Legendary golden styling
      bubble.classList.toggle('legendary', !!payload.legendary);
      document.getElementById('outputGorilla').textContent = payload.legendary ? '👑' : '🦍';

      // Gorilla-o-meter rating
      const rating = makeRating(payload.legendary);
      const score = document.getElementById('meterScore');
      score.textContent = '翻訳精度 ' + rating.pct + '%';
      score.classList.toggle('wild', !!rating.wild);
      document.getElementById('meterCert').textContent = '🦍🎓 ' + rating.cert;

      outputArea.style.display = '';
      // Re-trigger speech bubble animation
      bubble.style.animation = 'none';
      bubble.offsetHeight;
      bubble.style.animation = '';

      animateGorilla();
      animateEmoji();
      updateMoodUI();
      updateProgressBar();
      registerCombo();

      if (payload.legendary) { playGorillaSound(4); bananaRain(12); }

      // Banana祭り easter egg
      if (/バナナ.?バナナ/.test(input)) {
        bananaRain(30);
        showToast('🍌🍌🍌 バナナ祭り！🍌🍌🍌');
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      // Restore gorilla name & initial mood
      updateNameDisplay(getGorillaName());
      updateMoodUI();

      // Translate button
      document.getElementById('translateBtn').addEventListener('click', function() {
        const input = document.getElementById('mainInput').value;
        handleTranslation(translateGorillaToJapanese(input), input);
      });

      // Reverse button
      document.getElementById('reverseBtn').addEventListener('click', function() {
        const input = document.getElementById('mainInput').value;
        handleTranslation(translateJapaneseToGorilla(input), input);
      });

      // Sound button
      document.getElementById('soundBtn').addEventListener('click', function() {
        playGorillaSound();
        animateGorilla();
      });

      // Share button
      document.getElementById('shareBtn').addEventListener('click', shareTranslation);

      // Name editing
      document.getElementById('nameEditBtn').addEventListener('click', startNameEdit);
      const nameInput = document.getElementById('gorillaNameInput');
      nameInput.addEventListener('blur', finishNameEdit);
      nameInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') finishNameEdit();
        if (e.key === 'Escape') { nameInput.value = getGorillaName(); finishNameEdit(); }
      });

      // Konami code → disco gorilla (physical keyboard: arrow keys + B + A)
      const KONAMI = ['arrowup', 'arrowup', 'arrowdown', 'arrowdown', 'arrowleft', 'arrowright', 'arrowleft', 'arrowright', 'b', 'a'];
      let kIdx = 0;
      document.addEventListener('keydown', function(e) {
        const key = e.key.length === 1 ? e.key.toLowerCase() : e.key.toLowerCase();
        if (key === KONAMI[kIdx]) {
          kIdx++;
          if (kIdx === KONAMI.length) { toggleDisco(); kIdx = 0; }
        } else {
          kIdx = (key === KONAMI[0]) ? 1 : 0;
        }
      });

      // Konami code → disco gorilla (typed as text, for phones with no arrow keys):
      // type "↑↑↓↓←→←→BA" into the input box, spaces optional, letters case-insensitive.
      const KONAMI_TEXT = '↑↑↓↓←→←→BA';
      const mainInput = document.getElementById('mainInput');
      mainInput.addEventListener('input', function(e) {
        const normalized = e.target.value.replace(/\s+/g, '').toUpperCase();
        if (normalized === KONAMI_TEXT) {
          toggleDisco();
          e.target.value = '';
        }
      });
    });

    // ===== PWA: service worker registration =====
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').catch(function() {
          /* offline install just won't be available — app still works online */
        });
      });
    }
  </script>
</body>
</html>
