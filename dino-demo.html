<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ゴリラ ランナー — Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    background: linear-gradient(180deg, #FFC107 0%, #FFD54F 50%, #FFF8E1 100%);
    min-height: 100vh;
    color: #3e2723;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
  }
  h1 { font-size: 20px; font-weight: 800; letter-spacing: 1px; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #6d4c41; margin-bottom: 14px; text-align: center; }
  .game-wrap {
    position: relative;
    width: 100%;
    max-width: 640px;
    background: #fffde7;
    border: 3px solid #ffe082;
    border-radius: 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    overflow: hidden;
  }
  canvas { display: block; width: 100%; height: auto; touch-action: none; }
  .hud {
    position: absolute;
    top: 8px;
    right: 12px;
    font-size: 13px;
    font-weight: 800;
    color: #6d4c41;
    text-align: right;
    line-height: 1.3;
    pointer-events: none;
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: rgba(255, 248, 225, 0.9);
    text-align: center;
    padding: 16px;
  }
  .overlay.hidden { display: none; }
  .overlay-title { font-size: 22px; font-weight: 900; }
  .overlay-sub { font-size: 13px; color: #6d4c41; }
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    width: 100%;
    max-width: 640px;
  }
  .btn {
    flex: 1;
    border: none;
    border-radius: 12px;
    min-height: 56px;
    font-size: 15px;
    font-weight: 800;
    font-family: inherit;
    cursor: pointer;
    color: #fff;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  .btn:active { transform: scale(0.96); }
  .btn-jump { background: #4CAF50; box-shadow: 0 3px 0 #388E3C; }
  .btn-duck { background: #FF9800; box-shadow: 0 3px 0 #E65100; }
  .hint { font-size: 12px; color: #8d6e63; margin-top: 14px; text-align: center; max-width: 480px; }
</style>
</head>
<body>
  <h1>🦍 ゴリラ ランナー</h1>
  <p class="subtitle">standalone demo — not linked from the main app yet</p>

  <div class="game-wrap">
    <canvas id="game" width="640" height="220"></canvas>
    <div class="hud"><div id="scoreLine">SCORE 0</div><div id="bestLine">BEST 0</div></div>
    <div class="overlay" id="startOverlay">
      <div class="overlay-title">🦍 ゴリラ ランナー</div>
      <div class="overlay-sub">バナナを跳べ、鳥をよけろ</div>
      <div class="overlay-sub">Space/↑ = ジャンプ　↓ = しゃがむ</div>
      <div class="overlay-sub">タップしてスタート</div>
    </div>
    <div class="overlay hidden" id="overOverlay">
      <div class="overlay-title">GAME OVER</div>
      <div class="overlay-sub" id="overScore">SCORE 0</div>
      <div class="overlay-sub">もう一度タップ</div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-jump" id="jumpBtn">🦍 JUMP</button>
    <button class="btn btn-duck" id="duckBtn">🦆 DUCK</button>
  </div>

  <p class="hint">キーボード: Space/↑でジャンプ、↓長押しでしゃがむ。スマホはボタンをタップ/長押し。</p>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const GROUND_Y = H - 30;

    const HIGH_SCORE_KEY = 'gorillaDinoHighScore';
    function getHighScore() {
      try { return parseInt(localStorage.getItem(HIGH_SCORE_KEY), 10) || 0; } catch (e) { return 0; }
    }
    function setHighScore(v) {
      try { localStorage.setItem(HIGH_SCORE_KEY, String(v)); } catch (e) { /* Safari private mode */ }
    }

    let audioCtx = null;
    function beep(freq, dur, type) {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = type || 'square';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + dur);
        osc.start();
        osc.stop(audioCtx.currentTime + dur);
      } catch (e) { /* no audio, no big deal */ }
    }

    const player = {
      x: 60,
      standH: 44,
      duckH: 26,
      w: 40,
      y: 0,
      vy: 0,
      ducking: false,
      onGround: true,
    };

    function playerHeight() { return player.ducking ? player.duckH : player.standH; }
    function playerTop() { return GROUND_Y - playerHeight(); }

    const GRAVITY = 0.0035;
    const JUMP_VELOCITY = -0.92;

    let obstacles = [];
    let speed = 0.28; // px/ms
    let elapsed = 0;
    let score = 0;
    let running = false;
    let lastTs = null;
    let spawnTimer = 0;
    let nextSpawnIn = 1200;

    function reset() {
      player.y = 0;
      player.vy = 0;
      player.ducking = false;
      player.onGround = true;
      obstacles = [];
      speed = 0.28;
      elapsed = 0;
      score = 0;
      spawnTimer = 0;
      nextSpawnIn = 1200;
    }

    function jump() {
      if (!running) { start(); return; }
      if (player.onGround && !player.ducking) {
        player.vy = JUMP_VELOCITY;
        player.onGround = false;
        beep(520, 0.08);
      }
    }

    function setDuck(on) {
      if (!running) return;
      player.ducking = on && player.onGround;
    }

    function spawnObstacle() {
      const isBird = Math.random() < 0.35 && elapsed > 4000;
      if (isBird) {
        obstacles.push({
          type: 'bird',
          x: W + 20,
          w: 34, h: 22,
          y: GROUND_Y - player.standH - 6, // low-flying, must duck
        });
      } else {
        const wide = Math.random() < 0.3;
        obstacles.push({
          type: 'banana',
          x: W + 20,
          w: wide ? 46 : 26,
          h: 30,
        });
      }
    }

    function update(dt) {
      elapsed += dt;
      score = Math.floor(elapsed / 100);
      speed = Math.min(0.62, 0.28 + elapsed / 60000);

      // Player physics
      if (!player.onGround) {
        player.vy += GRAVITY * dt;
        player.y += player.vy * dt;
        if (player.y >= 0) {
          player.y = 0;
          player.vy = 0;
          player.onGround = true;
        }
      }

      // Spawn obstacles
      spawnTimer += dt;
      if (spawnTimer >= nextSpawnIn) {
        spawnTimer = 0;
        nextSpawnIn = 750 + Math.random() * 900 - Math.min(400, elapsed / 100);
        nextSpawnIn = Math.max(420, nextSpawnIn);
        spawnObstacle();
      }

      // Move obstacles
      const dx = speed * dt;
      for (const o of obstacles) o.x -= dx;
      obstacles = obstacles.filter(o => o.x + o.w > -10);

      // Collisions (simple AABB)
      const pTop = playerTop() + player.y;
      const pBottom = GROUND_Y + player.y;
      for (const o of obstacles) {
        const oTop = o.type === 'bird' ? o.y : GROUND_Y - o.h;
        const oBottom = o.type === 'bird' ? o.y + o.h : GROUND_Y;
        const overlapX = player.x + player.w > o.x && player.x < o.x + o.w;
        const overlapY = pBottom > oTop && pTop < oBottom;
        if (overlapX && overlapY) {
          gameOver();
          return;
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Ground
      ctx.strokeStyle = '#d4a017';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, GROUND_Y + 1);
      ctx.lineTo(W, GROUND_Y + 1);
      ctx.stroke();

      // Player
      ctx.font = playerHeight() + 'px sans-serif';
      ctx.textBaseline = 'bottom';
      ctx.textAlign = 'left';
      const emoji = player.ducking ? '🦧' : '🦍';
      ctx.save();
      if (player.ducking) {
        ctx.translate(player.x, GROUND_Y + player.y);
        ctx.scale(1.15, 0.7);
        ctx.fillText(emoji, 0, 0);
      } else {
        ctx.fillText(emoji, player.x, GROUND_Y + player.y);
      }
      ctx.restore();

      // Obstacles
      for (const o of obstacles) {
        if (o.type === 'bird') {
          ctx.font = o.h + 'px sans-serif';
          ctx.fillText('🐦', o.x, o.y + o.h);
        } else {
          ctx.font = o.h + 'px sans-serif';
          ctx.fillText('🍌', o.x, GROUND_Y);
        }
      }
    }

    function frame(ts) {
      if (!running) return;
      if (lastTs === null) lastTs = ts;
      const dt = Math.min(50, ts - lastTs);
      lastTs = ts;
      update(dt);
      draw();
      document.getElementById('scoreLine').textContent = 'SCORE ' + score;
      if (running) requestAnimationFrame(frame);
    }

    function start() {
      reset();
      document.getElementById('startOverlay').classList.add('hidden');
      document.getElementById('overOverlay').classList.add('hidden');
      document.getElementById('bestLine').textContent = 'BEST ' + getHighScore();
      running = true;
      lastTs = null;
      requestAnimationFrame(frame);
    }

    function gameOver() {
      running = false;
      beep(140, 0.3, 'sawtooth');
      const best = Math.max(score, getHighScore());
      setHighScore(best);
      document.getElementById('overScore').textContent = 'SCORE ' + score + '　(BEST ' + best + ')';
      document.getElementById('overOverlay').classList.remove('hidden');
      document.getElementById('bestLine').textContent = 'BEST ' + best;
    }

    // Controls: keyboard (desktop)
    document.addEventListener('keydown', function(e) {
      if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
      if (e.code === 'ArrowDown') { e.preventDefault(); setDuck(true); }
    });
    document.addEventListener('keyup', function(e) {
      if (e.code === 'ArrowDown') setDuck(false);
    });

    // Controls: on-screen buttons (mobile-friendly)
    const jumpBtn = document.getElementById('jumpBtn');
    const duckBtn = document.getElementById('duckBtn');
    jumpBtn.addEventListener('pointerdown', function(e) { e.preventDefault(); jump(); });
    duckBtn.addEventListener('pointerdown', function(e) { e.preventDefault(); setDuck(true); });
    duckBtn.addEventListener('pointerup', function() { setDuck(false); });
    duckBtn.addEventListener('pointerleave', function() { setDuck(false); });

    // Tap the game area itself to start/jump too
    canvas.addEventListener('pointerdown', function(e) { e.preventDefault(); jump(); });

    // Initial idle draw
    draw();
    document.getElementById('bestLine').textContent = 'BEST ' + getHighScore();
  </script>
</body>
</html>
